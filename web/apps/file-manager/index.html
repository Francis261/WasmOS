<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>File Manager</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; }
      ul { padding-left: 16px; }
      input, button { font: inherit; margin-right: 6px; }
      code { background: #eee; padding: 2px 4px; }
    </style>
  </head>
  <body>
    <h1>File Manager</h1>
    <div>
      <input id="filename" placeholder="filename.txt" />
      <button id="create">Create</button>
      <button id="refresh">Refresh</button>
    </div>
    <ul id="files"></ul>
    <script type="module">
      import { createAppApi } from '/desktop/app-sdk.js';
      const api = createAppApi('file-manager');
      const listEl = document.querySelector('#files');
      async function refresh() {
        const payload = await api.sharedList('.');
        listEl.innerHTML = '';
        for (const entry of payload.entries) {
          const li = document.createElement('li');
          li.innerHTML = `<code>${entry.kind}</code> ${entry.name} `;
          if (entry.kind === 'file') {
            const del = document.createElement('button');
            del.textContent = 'Delete';
            del.onclick = async () => { await fetch('/api/fs/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ scope: 'shared', path: entry.name }) }); refresh(); };
            li.appendChild(del);
          }
          listEl.appendChild(li);
        }
      }
      document.querySelector('#create').addEventListener('click', async () => {
        const filename = document.querySelector('#filename').value.trim();
        if (!filename) return;
        await fetch('/api/fs/write', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ scope: 'shared', path: filename, content: '' }) });
        refresh();
      });
      document.querySelector('#refresh').addEventListener('click', refresh);
      refresh();
    </script>
  </body>
</html>
