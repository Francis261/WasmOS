set timeout=0
set default=0
set gfxmode=auto
set gfxpayload=keep
insmod png
background_image /boot/grub/splash.png
terminal_output gfxterm

menuentry "WasmOS" {
    linux /boot/vmlinuz quiet splash loglevel=3 vt.global_cursor_default=0 systemd.unit=multi-user.target webos.autostart=1
    initrd /boot/initrd.img
}
